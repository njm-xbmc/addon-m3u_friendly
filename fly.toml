app = "m3u-friendly"
primary_region = "lhr"

[build]
  dockerfile = "python/Dockerfile"
  context = "python"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
